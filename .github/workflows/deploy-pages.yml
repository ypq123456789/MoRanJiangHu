name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /
      VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
      VITE_SYNC_API_BASE_URL: ${{ vars.VITE_SYNC_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate GitHub OAuth build env
        run: |
          if [ -z "${VITE_GITHUB_CLIENT_ID}" ]; then
            echo "::error::Missing required GitHub OAuth build secret: VITE_GITHUB_CLIENT_ID"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Install Wrangler
        run: npm install --no-save wrangler@4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: npx wrangler pages deploy dist --project-name=moranjianghu --branch=main
